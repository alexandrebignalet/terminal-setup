# Starship prompt config.
# Docs: https://starship.rs/config

format = """
$directory\
$git_branch\
$git_status\
$nodejs\
$python\
$ruby\
$rust\
$cmd_duration\
$line_break\
$character"""

add_newline = true

[character]
success_symbol = "[›](bold green)"
error_symbol   = "[›](bold red)"

[directory]
truncation_length = 3
truncate_to_repo  = true
style = "bold cyan"

[git_branch]
symbol = " "
style  = "bold purple"

[git_status]
style = "bold yellow"

[cmd_duration]
min_time = 2_000
format   = "[$duration]($style) "
style    = "yellow"

# Hide noisy modules
[gcloud]
disabled = true
[aws]
disabled = true
[package]
disabled = true
